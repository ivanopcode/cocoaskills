<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CocoaSkill</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        padding: 48px 24px;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 40px;
      }
      p {
        color: color-mix(in srgb, CanvasText 78%, Canvas);
      }
      pre {
        overflow-x: auto;
        padding: 16px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, Canvas);
        border-radius: 8px;
        background: color-mix(in srgb, CanvasText 5%, Canvas);
      }
      a {
        color: LinkText;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CocoaSkill</h1>
      <p>Local skill manager for AI agent skills with reproducible per-project installs.</p>
      <pre><code>curl -fsSL https://cocoaskills.org/install.sh | sh</code></pre>
      <p>Or install with mise:</p>
      <pre><code>mise use -g pipx:cocoaskills@latest</code></pre>
      <p>
        Source, documentation, and releases live at
        <a href="https://github.com/ivanopcode/cocoaskills">github.com/ivanopcode/cocoaskills</a>.
      </p>
    </main>
  </body>
</html>
